default_source: daily_bible

reading_plans:
  daily_bible:
    name: "매일성경 (성서유니온)"
    description: |
      매일성경 정기 구독으로 매달 책자 구입 후, 그 달의 읽기표를 아래 schedule에 
      날짜별로 추가하세요. 보통 2개월치 미리 넣어두면 편합니다.
      
      팁: 구독 앱의 '이달의 읽기표' 화면을 보며 YAML에 붙여넣기 (3-5분).
    schedule:
      "2026-04-20": "시편 149:1-9"
      "2026-04-21": "잠언 1:1-19"
      "2026-04-22": "잠언 1:20-33"
      "2026-04-23": "잠언 2:1-22"
      "2026-04-24": "잠언 3:1-12"
      "2026-04-25": "잠언 3:13-35"
      "2026-04-26": "잠언 4:1-27"
      "2026-04-27": "잠언 5:1-23"

  custom:
    name: "자유 묵상"
    description: |
      특정 책을 이어서 집중 묵상하고 싶을 때. daily_bible과 별개로 운영.
      default_source를 custom으로 바꾸고 schedule에 일정 입력.
    schedule: {}
